name: Build & Sign APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode keystore
        run: printf '%s' "$KEYSTORE_BASE64" | base64 --decode > keystore.jks

      - name: Create keystore.properties
        run: |
          STORE_PASSWORD_CLEAN=$(printf '%s' "$STORE_PASSWORD" | tr -d '\r')
          KEY_ALIAS_CLEAN=$(printf '%s' "$KEY_ALIAS" | tr -d '\r')
          KEY_PASSWORD_CLEAN=$(printf '%s' "$KEY_PASSWORD" | tr -d '\r')
          printf '%s\n' \
            "storeFile=$GITHUB_WORKSPACE/keystore.jks" \
            "storePassword=$STORE_PASSWORD_CLEAN" \
            "keyAlias=$KEY_ALIAS_CLEAN" \
            "keyPassword=$KEY_PASSWORD_CLEAN" \
            > keystore.properties

      - name: Verify keystore alias
        run: |
          STORE_PASSWORD_CLEAN=$(printf '%s' "$STORE_PASSWORD" | tr -d '\r')
          KEY_ALIAS_CLEAN=$(printf '%s' "$KEY_ALIAS" | tr -d '\r')
          if ! keytool -list -keystore keystore.jks -storepass "$STORE_PASSWORD_CLEAN" | grep -Fq "$KEY_ALIAS_CLEAN"; then
            echo "Alias not found in keystore. Available aliases:"
            keytool -list -keystore keystore.jks -storepass "$STORE_PASSWORD_CLEAN"
            exit 1
          fi

      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: chemsearch-release
          path: app/build/outputs/apk/release/*.apk
