# Documentation: https://simplelocalize.io/docs/integrations/github-app/
# You can use {lang} and {ns} placeholders in paths

upload:
  when:
    push:
  files:
    - path: "i18n/source_en.json" # Path to your source translations
      format: "single-language-json" # Input file format
      language-key: "en" # Input language key
      options:
        - REPLACE_TRANSLATION_IF_FOUND
        - DEPRECATE_NOT_PRESENT_KEYS
        - ACTIVATE_PRESENT_KEYS

download:
  files:
    - path: "i18n/messages_{lang}.json" # Output translations
      format: "single-language-json" # Output file format
      sort: "LEXICOGRAPHICAL"
      options:
        - "EXCLUDE_DEPRECATED_KEYS"

pull-request:
